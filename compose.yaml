services:
  bloca-landing-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  bloca-landing-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json
